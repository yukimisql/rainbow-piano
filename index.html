<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Piano</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f7f4eb;
            user-select: none;
            -webkit-user-select: none;
            gap: 25px;
            font-family: 'Fredoka', sans-serif;
        }

        .piano-container {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .white-key {
            width: 260px;
            height: 75px;
            background: #ffffff;
            border: none;
            border-radius: 12px 0 0 12px;
            box-sizing: border-box;
            margin: 2px 0;
            transition: background 0.4s ease;
        }

        .black-keys-container {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 100%;
            pointer-events: none;
        }

        .black-key-wrap {
            position: absolute;
            pointer-events: auto;
        }

        .black-key-wrap:nth-child(1) { top: 56px; }
        .black-key-wrap:nth-child(2) { top: 135px; }
        .black-key-wrap:nth-child(3) { top: 293px; }
        .black-key-wrap:nth-child(4) { top: 372px; }
        .black-key-wrap:nth-child(5) { top: 451px; }

        .black-key {
            width: 155px;
            height: 44px;
            background: #b1c2cb;
            border: none;
            border-radius: 8px 0 0 8px;
            cursor: pointer;
            transition: background 0.4s ease, transform 0.1s ease;
            display: block;
            margin-left: 105px;
            position: relative;
        }

        .black-key:active { transform: scaleX(0.97); }
        .black-key.active { background: #4a5568; }

        .date-label {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            color: #ffffff;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            writing-mode: vertical-lr;
            text-orientation: mixed;
            letter-spacing: 2px;
        }

        .black-key-wrap.unlocked:hover .date-label { opacity: 1; }

        .white-key.reveal-1 { background: #ffe3e5; }
        .white-key.reveal-2 { background: #fff0e0; }
        .white-key.reveal-3 { background: #fffded; }
        .white-key.reveal-4 { background: #f4faeb; }
        .white-key.reveal-5 { background: #eaf6fc; }
        .white-key.reveal-6 { background: #eaeefc; }
        .white-key.reveal-7 { background: #f6eafc; }

        .piano-container.max-saturation .white-key:nth-child(1) { background: #ff9aa2; }
        .piano-container.max-saturation .white-key:nth-child(2) { background: #ffcab0; }
        .piano-container.max-saturation .white-key:nth-child(3) { background: #fff5ba; }
        .piano-container.max-saturation .white-key:nth-child(4) { background: #b5ead7; }
        .piano-container.max-saturation .white-key:nth-child(5) { background: #a7dbd8; }
        .piano-container.max-saturation .white-key:nth-child(6) { background: #90afdf; }
        .piano-container.max-saturation .white-key:nth-child(7) { background: #e2bbf0; }

        .reset-button {
            width: 52px;
            height: 52px;
            background-color: #eadabe;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .reset-button:hover { background-color: #dfd0b2; }
        .reset-button:active { transform: scale(0.95); }

        .reset-button svg {
            width: 22px;
            height: 22px;
            stroke: #7f6d55;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="piano-container" id="piano">
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>

        <div class="black-keys-container">
            <div class="black-key-wrap" data-index="0" data-left="0" data-right="1">
                <div class="black-key"><div class="date-label"></div></div>
            </div>
            <div class="black-key-wrap" data-index="1" data-left="1" data-right="2">
                <div class="black-key"><div class="date-label"></div></div>
            </div>
            <div class="black-key-wrap" data-index="2" data-left="3" data-right="4">
                <div class="black-key"><div class="date-label"></div></div>
            </div>
            <div class="black-key-wrap" data-index="3" data-left="4" data-right="5">
                <div class="black-key"><div class="date-label"></div></div>
            </div>
            <div class="black-key-wrap" data-index="4" data-left="5" data-right="6">
                <div class="black-key"><div class="date-label"></div></div>
            </div>
        </div>
    </div>

    <button class="reset-button" id="resetBtn" aria-label="Reset">
        <svg viewBox="0 0 24 24">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
        </svg>
    </button>

    <script>
        const wraps = document.querySelectorAll('.black-key-wrap');
        const whiteKeys = document.querySelectorAll('.white-key');
        const piano = document.getElementById('piano');
        const resetBtn = document.getElementById('resetBtn');

        let keyStates = [false, false, false, false, false];
        let keyDates  = [null, null, null, null, null];

        function formatDate(iso) {
            const d = new Date(iso);
            return `${d.getMonth()+1}/${d.getDate()}`;
        }

        function loadSavedState() {
            try {
                const saved = localStorage.getItem('piano_progress_2026');
                if (saved) {
                    const p = JSON.parse(saved);
                    keyStates = p.states || [false, false, false, false, false];
                    keyDates  = p.dates  || [null, null, null, null, null];
                }
            } catch(e) {}
            renderKeyboard();
        }

        function saveState() {
            try {
                localStorage.setItem('piano_progress_2026', JSON.stringify({ states: keyStates, dates: keyDates }));
            } catch(e) {}
        }

        function renderKeyboard() {
            piano.classList.remove('max-saturation');
            whiteKeys.forEach(wk => wk.className = 'white-key');
            let count = 0;
            wraps.forEach((wrap, i) => {
                const bk    = wrap.querySelector('.black-key');
                const label = wrap.querySelector('.date-label');
                const l     = parseInt(wrap.getAttribute('data-left'));
                const r     = parseInt(wrap.getAttribute('data-right'));
                if (keyStates[i]) {
                    bk.classList.add('active');
                    wrap.classList.add('unlocked');
                    count++;
                    whiteKeys[l].classList.add(`reveal-${l + 1}`);
                    whiteKeys[r].classList.add(`reveal-${r + 1}`);
                    label.textContent = keyDates[i] ? formatDate(keyDates[i]) : '';
                } else {
                    bk.classList.remove('active');
                    wrap.classList.remove('unlocked');
                    label.textContent = '';
                }
            });
            if (count === 5) piano.classList.add('max-saturation');
        }

        wraps.forEach(wrap => {
            wrap.querySelector('.black-key').addEventListener('click', function() {
                const i = parseInt(wrap.getAttribute('data-index'));
                keyStates[i] = !keyStates[i];
                if (keyStates[i] && !keyDates[i]) keyDates[i] = new Date().toISOString();
                else if (!keyStates[i]) keyDates[i] = null;
                saveState();
                renderKeyboard();
            });
        });

        resetBtn.addEventListener('click', function() {
            keyStates = [false, false, false, false, false];
            keyDates  = [null, null, null, null, null];
            saveState();
            renderKeyboard();
        });

        loadSavedState();
    </script>

</body>
</html>
